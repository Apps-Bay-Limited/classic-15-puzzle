name: classic_15_puzzle
description: A new Flutter application.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# Read more about versioning at semver.org.
version: 1.2.0+12

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  fluttertoast: ^9.1.0
  url_launcher: ^6.3.0
  share_plus: ^13.2.0
  color: ^3.0.0
  encrypt: ^5.0.3
  package_info_plus: ^10.2.0

  app_tracking_transparency: ^2.0.4
  in_app_review: ^2.0.9
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.2.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://www.dartlang.org/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/sounds/move.wav
    - assets/sounds/victory.wav

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.io/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.io/assets-and-images/#from-packages

  fonts:
    - family: ManRope
      fonts:
        - asset: fonts/ManRope/manrope-thin.ttf
          weight: 100
        - asset: fonts/ManRope/manrope-light.ttf
          weight: 300
        - asset: fonts/ManRope/manrope-regular.ttf
          weight: 400
        - asset: fonts/ManRope/manrope-medium.ttf
          weight: 500
        - asset: fonts/ManRope/manrope-bold.ttf
          weight: 700
        - asset: fonts/ManRope/manrope-extrabold.ttf
          weight: 900

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.io/custom-fonts/#from-packages
